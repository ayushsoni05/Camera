<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0B0C10;
        }
        
        /* User Avatar Pulse Icon */
        .user-marker {
            width: 32dp;
            height: 32dp;
            background: #00FF14;
            border: 3px solid #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 15px #00FF14;
            animation: pulse 1.6s infinite;
        }

        /* Ghost Mode User Icon */
        .ghost-marker {
            width: 32dp;
            height: 32dp;
            background: #A0AEC0;
            border: 3px solid #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 15px #FFFFFF;
            animation: pulse-ghost 2s infinite;
        }

        /* Friend Avatar Icon */
        .friend-marker {
            width: 30dp;
            height: 30dp;
            background: #6366F1;
            border: 3.5px solid #FFFC00; /* Snapchat Yellow Border! */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* POI Stories Hotspot */
        .hotspot-marker {
            width: 24dp;
            height: 24dp;
            background: #FFA500;
            border: 3px solid #FFFC00;
            border-radius: 50%;
            box-shadow: 0 0 15px #FFA500;
            animation: pulse-hotspot 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 255, 20, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(0, 255, 20, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 255, 20, 0); }
        }

        @keyframes pulse-ghost {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        @keyframes pulse-hotspot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.8); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 15px rgba(255, 165, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 165, 0, 0); }
        }

        /* Search Radar Ping */
        .search-ping-marker {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ping-circle {
            width: 10px;
            height: 10px;
            background: #FFFC00; /* Snapchat Yellow */
            border: 3px solid #FFFFFF;
            border-radius: 50%;
            box-shadow: 0 0 20px #FFFC00;
            animation: ping-expand 1.5s ease-out infinite;
        }
        @keyframes ping-expand {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 252, 0, 0.8); }
            100% { transform: scale(6); opacity: 0; box-shadow: 0 0 0 30px rgba(255, 252, 0, 0); }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = null;
        var userMarker = null;
        var friendMarkers = {};
        var hotspotMarkers = {};
        var searchPing = null;

        function initMap() {
            if (typeof L === 'undefined') {
                setTimeout(initMap, 100);
                return;
            }
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([34.0522, -118.2437], 14);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);
        }
        initMap();

        // 1. Update Current User Marker
        function updateUserLocation(lat, lng, isGhost, avatarSvg) {
            if (!map) {
                setTimeout(function() { updateUserLocation(lat, lng, isGhost, avatarSvg); }, 200);
                return;
            }
            var latlng = [lat, lng];
            map.panTo(latlng);
            
            var markerClass = isGhost ? 'ghost-marker' : 'user-marker';
            var htmlContent = isGhost 
                ? '<svg viewBox="0 0 100 100" width="24" height="24" style="margin-top:2px;"><path fill="#FFFFFF" stroke="#000" stroke-width="5" d="M50,15 C32,15 22,25 22,43 C22,48 24,53 25,56 C26,59 23,62 20,65 C17,68 18,72 23,73 C26,73.5 28,71 31,70 C33,69.5 35,71 36,73 C37,76 40,78 45,78 C48,78 50,76.5 52,76.5 C54,76.5 56,78 59,78 C64,78 67,76 68,73 C69,71 71,69.5 73,70 C76,71 78,73.5 81,73 C86,72 87,68 84,65 C81,62 78,59 79,56 C80,53 82,48 82,43 C82,25 72,15 50,15 Z"/></svg>'
                : avatarSvg;
            
            var userIcon = L.divIcon({
                className: markerClass,
                html: htmlContent,
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });

            if (userMarker) {
                userMarker.setLatLng(latlng);
                userMarker.setIcon(userIcon);
            } else {
                userMarker = L.marker(latlng, {icon: userIcon}).addTo(map);
                userMarker.on('click', function() {
                    if (window.AndroidMap) {
                        window.AndroidMap.onUserMarkerClicked();
                    }
                });
            }
        }

        // 2. Update Friend Marker
        function updateFriendLocation(name, lat, lng, avatarSvg) {
            if (!map) {
                setTimeout(function() { updateFriendLocation(name, lat, lng, avatarSvg); }, 200);
                return;
            }
            var latlng = [lat, lng];
            
            var friendIcon = L.divIcon({
                className: 'friend-marker',
                html: avatarSvg,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            if (friendMarkers[name]) {
                friendMarkers[name].setLatLng(latlng);
                friendMarkers[name].setIcon(friendIcon);
            } else {
                var marker = L.marker(latlng, {icon: friendIcon}).addTo(map);
                marker.on('click', function() {
                    if (window.AndroidMap) {
                        window.AndroidMap.onFriendClicked(name);
                    }
                });
                friendMarkers[name] = marker;
            }
        }

        // 3. Add POI Hotspots
        function addHotspot(name, lat, lng) {
            if (!map) {
                setTimeout(function() { addHotspot(name, lat, lng); }, 200);
                return;
            }
            var latlng = [lat, lng];
            
            var hotspotIcon = L.divIcon({
                className: 'hotspot-marker',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            if (!hotspotMarkers[name]) {
                var marker = L.marker(latlng, {icon: hotspotIcon}).addTo(map);
                marker.on('click', function() {
                    if (window.AndroidMap) {
                        window.AndroidMap.onHotspotClicked(name);
                    }
                });
                hotspotMarkers[name] = marker;
            }
        }

        // 4. Show Search Radar Circle Effect
        function showSearchPing(lat, lng) {
            if (!map) return;
            var latlng = [lat, lng];
            map.setView(latlng, 16);
            
            if (searchPing) {
                map.removeLayer(searchPing);
            }
            
            var pingIcon = L.divIcon({
                className: 'search-ping-marker',
                html: '<div class="ping-circle"></div>',
                iconSize: [60, 60],
                iconAnchor: [30, 30]
            });
            
            searchPing = L.marker(latlng, {icon: pingIcon}).addTo(map);
            
            setTimeout(function() {
                if (searchPing) {
                    map.removeLayer(searchPing);
                    searchPing = null;
                }
            }, 3000);
        }
    </script>
</body>
</html>
